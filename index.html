<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quokka Coco | 矮袋鼠的療癒空間</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fcfaf2;
            color: #5d5246;
            line-height: 1.8;
        }

        header {
            background-color: #9cb08c;
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            margin: 10px 0;
            font-size: 2.2em;
            letter-spacing: 3px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .quokka-profile {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .intro-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
        }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .folder-item {
            background: #f4f1eb;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: #7d6e5d;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: center;
        }

        .folder-item:hover {
            background: #9cb08c;
            color: white;
            transform: translateY(-5px);
        }

        .icon {
            font-size: 2em;
            display: block;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #b5ada3;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

    <header>
        <h1>Quokka Coco</h1>
        <p>Stay Happy, Stay Curious</p>
    </header>

    <div class="container">
        <div class="intro-card">
            <img src="assets/images/quokka.png" alt="Cute Quokka" class="quokka-profile">
            
            <h2>About Me</h2>
            <p>嗨！我是 Coco。這是一個像矮袋鼠口袋一樣溫暖的小空間。我喜歡蒐集生活中的美好瞬間，保持微笑和好奇心，探索這個世界。</p>

            <div class="folder-grid">
                <a href="assets/images/" class="folder-item">
                    <span class="icon">🖼️</span> 圖片牆
                </a>
                <a href="assets/music/" class="folder-item">
                    <span class="icon">🎵</span> 聽音樂
                </a>
                <a href="assets/videos/" class="folder-item">
                    <span class="icon">🎥</span> 看影片
                </a>
                <a href="#" class="folder-item">
                    <span class="icon">📂</span> 其他物件
                </a>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Quokka Coco. Designed with Smile.</p>
    </footer>

</body>
</html>
