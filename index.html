<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quokka Coco | 矮袋鼠的療癒空間</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fcfaf2;
            color: #5d5246;
            line-height: 1.8;
        }

        header {
            background-color: #9cb08c;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .quokka-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: sway 3s infinite ease-in-out;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        header h1 {
            margin: 10px 0;
            font-size: 2.2em;
            letter-spacing: 3px;
        }

        header p {
            margin: 0;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 30px;
        }

        .intro-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
        }

        h2 {
            color: #8fa380;
            font-size: 1.6em;
            margin-bottom: 20px;
        }

        .bio-text {
            font-size: 1.1em;
            text-align: justify;
            margin-bottom: 30px;
        }

        .hobby-tags {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tag {
            background-color: #efeae4;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #7d6e5d;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #b5ada3;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

    <header>
        <div class="quokka-icon">🦘</div>
        <h1>Quokka Coco</h1>
        <p>Stay Happy, Stay Curious</p>
    </header>

    <div class="container">
        <div class="intro-card">
            <h2>About Me</h2>
            <div class="bio-text">
                嗨！我是 Coco。這是一個像矮袋鼠口袋一樣溫暖的小空間。<br>
                我喜歡蒐集生活中的美好瞬間，無論是旅行的足跡、閱讀的心得，或是任何讓生活變得更有趣的小事。我深信保持微笑和好奇心，是探索這個世界最棒的方式。歡迎來到我的小天地，一起發現更多有趣的故事！
            </div>

            <div class="hobby-tags">
                <span class="tag"># 冒險</span>
                <span class="tag"># 永續生活</span>
                <span class="tag"># 攝影</span>
                <span class="tag"># 探索</span>
                <span class="tag"># 矮袋鼠精神</span>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Quokka Coco. Designed with Smile.</p>
    </footer>

</body>
</html>
